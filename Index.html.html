    display: grid;

  }

  .door {
    aspect-ratio: 3/4;
    position: relative;
    cursor: pointer;
    perspective: 800px;
  }

  .door-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
    border-radius: 12px;
  }

  .door.opened .door-inner { transform: rotateY(-20deg); }
  .door.locked .door-inner { cursor: not-allowed; }

  .door-front, .door-back {
    position: absolute; inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
  }

  .door-front {
    background: linear-gradient(135deg, #3D2248 0%, #2A1A2E 100%);
    border: 1px solid rgba(201,151,58,0.3);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; padding: 12px;
    text-align: center;
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }

  .door:not(.locked):hover .door-front {
    border-color: rgba(201,151,58,0.7);
    box-shadow: 0 0 20px rgba(201,151,58,0.15);
  }

/* ============================================================

// South African Standard Time = UTC+2
const SAST_OFFSET = 2;

function getSASTNow() {
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  return new Date(utc + (SAST_OFFSET * 3600000));
}

function getDoorDate(dayIndex) {
  // Day index 0 = June 6, index 24 = June 30
  return new Date(2025, 5, 6 + dayIndex); // Month is 0-indexed; June = 5
}

function isDoorUnlocked(dayIndex) {
  const sast = getSASTNow();
  const doorDate = getDoorDate(dayIndex);
  // Unlock when SAST date >= door date (i.e. midnight on the door's date has passed)
  return (
    sast.getFullYear() > doorDate.getFullYear() ||
    (sast.getFullYear() === doorDate.getFullYear() && sast.getMonth() > doorDate.getMonth()) ||
    (sast.getFullYear() === doorDate.getFullYear() && sast.getMonth() === doorDate.getMonth() && sast.getDate() >= doorDate.getDate())
  );
}

function isToday(dayIndex) {
  const sast = getSASTNow();
  const doorDate = getDoorDate(dayIndex);
  return (
    sast.getFullYear() === doorDate.getFullYear() &&
    sast.getMonth() === doorDate.getMonth() &&
    sast.getDate() === doorDate.getDate()
  );
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function formatDoorDate(dayIndex) {
  const d = getDoorDate(dayIndex);
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

function buildCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  CALENDAR_DATA.forEach((data, i) => {
    const unlocked = isDoorUnlocked(i);
    const today = isToday(i);
    const opened = JSON.parse(localStorage.getItem('opened_' + i) || 'false');

    const door = document.createElement('div');
    door.className = 'door' + (unlocked ? '' : ' locked') + (today ? ' today' : '') + (opened && unlocked ? ' opened' : '');
    door.setAttribute('aria-label', `Day ${i+1}: ${data.movie}`);
    door.setAttribute('role', 'button');
    door.setAttribute('tabindex', unlocked ? '0' : '-1');

    if (today) {
      const badge = document.createElement('div');
      badge.className = 'today-badge';
      badge.textContent = '🎂 Today!';
      door.appendChild(badge);
    }

    door.innerHTML += `
      <div class="door-inner">
        <div class="door-front">
          ${!unlocked ? '<span class="lock-icon">🔒</span>' : ''}
          <div class="door-number">${i + 1}</div>
          <div class="door-date">${formatDoorDate(i)}</div>
          <div class="door-emoji">${unlocked ? data.emoji : '🔒'}</div>
          <div class="door-movie">${unlocked ? data.movie : '???'}</div>
          ${unlocked ? `<div class="door-tagline">${data.tagline}</div>` : ''}
        </div>
      </div>
    `;

    if (unlocked) {
      door.addEventListener('click', () => openOverlay(i));
      door.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openOverlay(i); });
    } else {
      door.addEventListener('click', () => showLockedMessage(i));
    }

    grid.appendChild(door);
  });
}

function showLockedMessage(i) {
  const sast = getSASTNow();
  const doorDate = getDoorDate(i);
  const diff = Math.ceil((doorDate - new Date(sast.getFullYear(), sast.getMonth(), sast.getDate())) / 86400000);
  alert(`🔒 This door opens on ${doorDate.getDate()} June at midnight SAST.\n\nCome back in ${diff} day${diff !== 1 ? 's' : ''}!`);
}

function openOverlay(i) {
  const data = CALENDAR_DATA[i];
  const today = isToday(i);

  document.getElementById('overlayDayNum').textContent = `Day ${i+1} · ${formatDoorDate(i)}` + (today ? ' · 🎂 Your Birthday Month' : '');
  document.getElementById('overlayTitle').textContent = data.movie;
  document.getElementById('overlayTagline').textContent = data.tagline;

  const imgEl = document.getElementById('overlayImage');
  if (data.image) {
    imgEl.src = data.image;
    imgEl.alt = data.movie + ' poster';
    imgEl.style.display = 'block';
  } else {
    imgEl.style.display = 'none';
  }

  document.getElementById('overlayMessage').textContent = data.message;

  const linkEl = document.getElementById('overlayLink');
  if (data.link) {
    linkEl.href = data.link;
    linkEl.textContent = data.linkLabel || 'Open Link';
    linkEl.style.display = 'inline-block';
  } else {
    linkEl.style.display = 'none';
  }

  document.getElementById('overlayAccent').style.background = data.theme || 'var(--gold)';

  document.getElementById('overlayBg').classList.add('active');
  document.body.style.overflow = 'hidden';

  // Mark as opened
  localStorage.setItem('opened_' + i, 'true');
  buildCalendar();
}

function closeOverlay() {
  document.getElementById('overlayBg').classList.remove('active');
  document.body.style.overflow = '';
}

function handleOverlayBgClick(e) {
  if (e.target === document.getElementById('overlayBg')) closeOverlay();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

buildCalendar();
</script>
</body>
</html>
